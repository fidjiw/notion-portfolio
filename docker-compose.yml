services:
  portfolio:
    build: .
    container_name: portfolio
    restart: unless-stopped
    ports:
      - "3002:3002"
    environment:
      - NOTION_TOKEN=${NOTION_TOKEN}
      - NOTION_DATABASE_ID=${NOTION_DATABASE_ID}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3002"]
      interval: 30s
      timeout: 10s
      retries: 3
